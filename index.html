<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>LoveSpace Pro ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #120018, #000);
    color: white;
    text-align: center;
}

/* Neon Title */
h1 {
    color: #ff2e7a;
    text-shadow: 0 0 10px #ff2e7a, 0 0 20px #ff2e7a;
    margin-top: 20px;
}

/* Login */
.login {
    margin-top: 120px;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 200px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #ff2e7a;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

/* Neon Cards */
.card {
    background: rgba(255,255,255,0.05);
    margin: 20px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 0 15px #ff2e7a33;
}

/* Gallery */
img {
    width: 100px;
    height: 100px;
    margin: 5px;
    border-radius: 10px;
    object-fit: cover;
}

/* Chat */
.chat-box {
    height: 200px;
    overflow-y: scroll;
    background: #111;
    padding: 10px;
    border-radius: 10px;
}

.msg {
    text-align: left;
    margin: 5px 0;
}

/* Mobile */
@media(max-width:600px){
    img { width: 70px; height: 70px; }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<!-- LOGIN -->
<div id="login" class="login">
    <h2>🔐 دخول LoveSpace</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="login()">دخول</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<h1>❤️ LoveSpace Pro</h1>

<div class="card">
    <h3>⏳ عداد الحب</h3>
    <p id="counter"></p>
</div>

<div class="card">
    <h3>📸 ألبوم صور</h3>
    <img src="https://picsum.photos/100?1">
    <img src="https://picsum.photos/100?2">
    <img src="https://picsum.photos/100?3">
</div>

<div class="card">
    <h3>❤️ زر الحب</h3>
    <button onclick="love()">بحبك</button>
</div>

<div class="card">
    <h3>💬 شات بينكم (تجريبي)</h3>
    <div class="chat-box" id="chat"></div>
    <input id="msg" placeholder="اكتب رسالة">
    <button onclick="send()">إرسال</button>
</div>

</div>

<script>

// 🔐 باسورد متغير يومي
function getPass(){
    let d = new Date().getDate();
    return "love" + (1000 + d);
}

function login(){
    let p = document.getElementById("pass").value;
    if(p === getPass()){
        document.getElementById("login").style.display="none";
        document.getElementById("site").style.display="block";
        document.getElementById("music").play();
        startCounter();
    } else {
        alert("❌ باسورد غلط (جرب اليومي)");
    }
}

// ⏳ عداد
let startDate = new Date("2024-01-01");

function startCounter(){
    setInterval(()=>{
        let now = new Date();
        let diff = now - startDate;
        let days = Math.floor(diff / (1000*60*60*24));
        document.getElementById("counter").innerHTML =
        "❤️ مع بعض من: " + days + " يوم";
    },1000);
}

// ❤️ قلوب
function love(){
    let c = document.createElement("div");
    c.innerHTML="❤️";
    c.style.position="fixed";
    c.style.left=Math.random()*100+"vw";
    c.style.top="100vh";
    c.style.fontSize="25px";
    document.body.appendChild(c);

    let move=setInterval(()=>{
        c.style.top=c.offsetTop-5+"px";
        if(c.offsetTop<0){c.remove();clearInterval(move);}
    },20);
}

// 💬 شات بسيط (محلي)
function send(){
    let msg = document.getElementById("msg").value;
    if(msg=="") return;

    let chat = document.getElementById("chat");
    chat.innerHTML += "<div class='msg'>❤️ أنت: "+msg+"</div>";
    document.getElementById("msg").value="";
}

</script>

</body>
    </html>
