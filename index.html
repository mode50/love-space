<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>LoveSpace 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffe6f0, #fff);
    text-align: center;
    color: #444;
}

/* Header */
h1 {
    color: #ff4d88;
    margin-top: 20px;
}

/* Login */
.login {
    margin-top: 120px;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ff99bb;
    width: 200px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #ff4d88;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

/* Cards */
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(255, 77, 136, 0.2);
}

/* Hearts */
.heart {
    position: fixed;
    color: #ff4d88;
    font-size: 20px;
    animation: float 3s linear forwards;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-500px); opacity: 0; }
}

/* Gallery */
img {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    margin: 5px;
    object-fit: cover;
}

/* Secret */
.secret {
    display: none;
    color: #ff4d88;
    margin-top: 10px;
}

/* Mobile */
@media(max-width:600px){
    img { width: 70px; height: 70px; }
}
</style>
</head>

<body>

<!-- 🎵 موسيقى -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<!-- 🔐 Login -->
<div id="login" class="login">
    <h2>💖 ادخل كلمة السر</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="login()">دخول</button>
</div>

<!-- 🌸 الموقع -->
<div id="site" style="display:none;">

<h1>💖 LoveSpace</h1>
<p>مكاننا الصغير الجميل ❤️</p>

<div class="card">
    <h3>⏳ علاقتنا</h3>
    <p id="counter"></p>
</div>

<div class="card">
    <h3>📸 ذكرياتنا</h3>
    <img src="https://picsum.photos/100?1">
    <img src="https://picsum.photos/100?2">
    <img src="https://picsum.photos/100?3">
</div>

<div class="card">
    <h3>💌 رسالة سرية</h3>
    <button onclick="showSecret()">افتح الرسالة</button>
    <div class="secret" id="secret">
        بحبك أكتر من أي كلمة في الدنيا 💖
    </div>
</div>

<div class="card">
    <h3>🎵 الموسيقى</h3>
    <button onclick="document.getElementById('music').play()">
        تشغيل الموسيقى
    </button>
</div>

<div class="card">
    <h3>❤️ زر الحب</h3>
    <button onclick="love()">بحبك</button>
</div>

</div>

<script>

// 🔐 باسورد بسيط (تقدر تغيره)
function login(){
    let p = document.getElementById("pass").value;
    if(p === "love"){
        document.getElementById("login").style.display="none";
        document.getElementById("site").style.display="block";
        startCounter();
    } else {
        alert("❌ كلمة السر غلط");
    }
}

// ⏳ عداد حب
let startDate = new Date("2024-01-01");

function startCounter(){
    setInterval(()=>{
        let now = new Date();
        let diff = now - startDate;
        let days = Math.floor(diff / (1000*60*60*24));
        document.getElementById("counter").innerHTML =
        "💖 مع بعض من: " + days + " يوم";
    },1000);
}

// ❤️ قلوب
function love(){
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "💖";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);

    setTimeout(()=>{h.remove()},3000);
}

// 💌 رسالة
function showSecret(){
    document.getElementById("secret").style.display="block";
}

</script>

</body>
</html>
